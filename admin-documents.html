<!DOCTYPE html>
<html>
<head>
  <title>Manage Documents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary px-3">
  <span class="navbar-brand">Document Manager</span>
  <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</nav>

<div class="container py-4">

  <div class="card p-3 mb-4">
    <h5>Add / Update Document</h5>

    <input id="docTitle" class="form-control mb-2"
           placeholder="Document Title (e.g. Driving Licence)">

    <input id="docLink" class="form-control mb-2"
           placeholder="Paste Google Drive direct link">

    <button class="btn btn-primary"
            onclick="addDocument()">
      Save Document
    </button>
  </div>

  <div class="card p-3">
    <h5>Existing Documents</h5>
    <ul id="docList" class="list-group"></ul>
  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
