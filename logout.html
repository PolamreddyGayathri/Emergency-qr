<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logging out...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: bg 8s ease infinite;
    }
    @keyframes bg {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .box {
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .lock { font-size: 3rem; margin-bottom: 12px; }
    h2 { color: #6366f1; font-weight: 800; margin: 0 0 8px; }
    p  { color: #64748b; margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="lock">🔒</div>
    <h2>Logging out...</h2>
    <p>Please wait a moment.</p>
  </div>

  <script>
    // Clear ALL stored Firebase auth data — no SDK needed
    try { sessionStorage.clear(); } catch(e) {}
    try { localStorage.clear();   } catch(e) {}

    // Also clear IndexedDB Firebase databases
    const dbs = ['firebaseLocalStorageDb', 'firebase-heartbeat-database',
                  'firebase-installations-database'];
    dbs.forEach(name => {
      try { indexedDB.deleteDatabase(name); } catch(e) {}
    });

    // Redirect to login page after 1 second
    setTimeout(function() {
      location.replace('admin-login.html?signout=1');
    }, 1000);
  </script>
</body>
</html>
