<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — QR Emergency</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css?v=2">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>
<!-- Logout success toast -->
<div id="logoutToast" style="
  display:none;
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#fff;
  padding:12px 28px;
  border-radius:50px;
  font-weight:700;
  font-size:1rem;
  box-shadow:0 8px 24px rgba(34,197,94,0.4);
  z-index:9999;
  transition:opacity 0.4s;
">
  ✅ &nbsp;Logged out successfully
</div>
<script>
  if (location.search.includes('signout=1')) {
    const t = document.getElementById('logoutToast');
    if (t) {
      t.style.display = 'block';
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display='none', 400); }, 2500);
    }
  }
</script>
<div class="login-box">
  <div class="card shadow border-0 p-4">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size:3rem;color:#8b5cf6 !important;"></i>
      <h4 id="formTitle" class="mt-2 fw-bold" style="background:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Login</h4>
    </div>

    <div id="loginAlert" class="alert alert-danger" style="display:none;"></div>

    <div class="input-group mb-3">
      <span class="input-group-text bg-white"><i class="bi bi-envelope-fill text-muted"></i></span>
      <input id="email" class="form-control" type="email" placeholder="Email Address">
    </div>

    <div class="input-group mb-4">
      <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>
      <input id="password" class="form-control" type="password" placeholder="Password">
    </div>

    <button id="authBtn" class="btn btn-primary w-100 mb-3 rounded-pill fw-bold shadow-sm">
      <i class="bi bi-box-arrow-in-right me-1"></i> Login
    </button>

    <div class="d-flex flex-column gap-2 text-center small">
      <a href="javascript:void(0)" id="toggleAuthBtn" class="text-decoration-none text-muted">
        Need an account? Register here.
      </a>
      <a href="javascript:void(0)" id="forgotBtn" class="text-decoration-none text-muted">
        Forgot Password?
      </a>
    </div>
  </div>
</div>

<script>
  // Always load fresh admin.js
  const s = document.createElement('script');
  s.type = 'module';
  s.src = 'admin.js?v=' + Date.now();
  document.head.appendChild(s);
</script>
</body>
</html>
