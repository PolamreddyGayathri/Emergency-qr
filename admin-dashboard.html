<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard — QR Emergency</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar shadow-sm mb-4">
    <span class="navbar-brand">
      <i class="bi bi-shield-lock-fill me-2"></i>Owner Dashboard
    </span>
    <!-- Logout: plain <a> link — always works, zero JS required -->
    <a href="logout.html" class="btn btn-logout" id="logoutBtn">
      <i class="bi bi-box-arrow-right me-1"></i> Logout
    </a>
  </nav>

  <!-- TOAST (placed at BOTTOM so it never overlaps navbar buttons) -->
  <div id="actionToast" class="alert alert-success toast-msg shadow" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span id="actionToastText">Done!</span>
  </div>

  <div class="container py-2 pb-5">

    <!-- QR LINK -->
    <div class="alert alert-info shadow-sm d-flex align-items-center mb-4" id="qrLinkContainer">
      <div class="spinner-border spinner-border-sm text-info me-2" role="status"></div>
      Generating your public QR link...
    </div>

    <!-- PROFILE -->
    <div class="card p-4 mb-4">
      <h5><i class="bi bi-person-lines-fill me-2"></i>Edit Profile</h5>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label text-muted small mb-1">Full Name</label>
          <input id="name" class="form-control" placeholder="John Doe">
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small mb-1">Blood Group</label>
          <input id="bloodGroup" class="form-control" placeholder="O+">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small mb-1">Full Residential Address</label>
        <input id="address" class="form-control" placeholder="123 Main St, City, State ZIP">
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small mb-1">Google Maps Link (Optional)</label>
        <input id="mapsLink" class="form-control" placeholder="https://maps.google.com/?q=...">
      </div>
      <button class="btn btn-primary fw-bold" onclick="window.saveProfile()">
        <i class="bi bi-save me-1"></i> Save Profile
      </button>
      <p class="text-muted mt-2 small" id="profileUpdated"></p>
    </div>

    <!-- MEDICAL ALERTS -->
    <div class="card p-4 mb-4">
      <h5><i class="bi bi-heart-pulse-fill me-2"></i>Medical Alerts</h5>
      <div class="input-group mb-3">
        <input id="newAlert" class="form-control" placeholder="E.g., Diabetic, Penicillin Allergy">
        <button class="btn btn-danger fw-bold" onclick="window.addMedicalAlert()">
          <i class="bi bi-plus-lg"></i> Add
        </button>
      </div>
      <ul id="alertsList" class="list-group"></ul>
    </div>

    <!-- CONTACTS -->
    <div class="card p-4 mb-4">
      <h5><i class="bi bi-telephone-fill me-2"></i>Emergency Contacts</h5>
      <div class="row g-2 mb-3">
        <div class="col-md-5">
          <input id="contactLabel" class="form-control" placeholder="Relationship (e.g. Wife)">
        </div>
        <div class="col-md-5">
          <input id="contactPhone" class="form-control" placeholder="Phone Number">
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100 fw-bold" onclick="window.addContact()">
            <i class="bi bi-person-plus-fill"></i> Add
          </button>
        </div>
      </div>
      <ul id="contactsList" class="list-group"></ul>
    </div>

    <!-- DOCUMENTS -->
    <div class="card p-4 mb-4">
      <h5><i class="bi bi-folder-fill me-2"></i>Documents (Google Drive)</h5>
      <div class="row g-2 mb-3">
        <div class="col-md-5">
          <input id="docTitle" class="form-control" placeholder="Document Title (e.g. ID Card)">
        </div>
        <div class="col-md-5">
          <input id="docLink" class="form-control" placeholder="Google Drive Share Link">
        </div>
        <div class="col-md-2">
          <button class="btn btn-warning w-100 fw-bold text-dark" onclick="window.addDocument()">
            <i class="bi bi-file-earmark-plus-fill"></i> Add
          </button>
        </div>
      </div>
      <ul id="documentsList" class="list-group"></ul>
    </div>

    <!-- DOCUMENT PASSWORD -->
    <div class="card p-4">
      <h5><i class="bi bi-key-fill me-2"></i>Change Document Password</h5>
      <div class="input-group">
        <input id="newDocPassword" class="form-control" placeholder="New document password">
        <button class="btn btn-secondary fw-bold" onclick="window.changeDocPassword()">
          <i class="bi bi-shield-lock"></i> Update Password
        </button>
      </div>
    </div>

  </div>

  <script>
    // Always load the latest admin.js — never use cached version
    const s = document.createElement('script');
    s.type = 'module';
    s.src = 'admin.js?v=' + Date.now();
    document.head.appendChild(s);
  </script>

</body>
</html>
